{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl border border-gray-100 text-center">
        <div class="inline-flex items-center justify-center p-3 bg-green-100 rounded-full mb-6">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                </path>
            </svg>
        </div>

        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Check your email</h2>

        <p class="text-gray-600 mt-4 leading-relaxed mb-8">
            We have sent an email with a link to reset your password. If it doesn't arrive in a few minutes, check your
            spam folder.
        </p>

        <a href="{% url 'login' %}"
            class="w-full inline-flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
