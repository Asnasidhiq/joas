{% extends "base.html" %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-10">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Reset Password</h2>
            <p class="text-sm text-gray-500 mt-2">Enter your email address below, and we'll email you a link to set a
                new password.</p>
        </div>

        <form method="POST" action="{% url 'account_reset_password' %}" class="space-y-6">
            {% csrf_token %}

            <div class="custom-django-form">
                {{ form.as_p }}
            </div>

            <button type="submit"
                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-300 transform hover:-translate-y-0.5">
                Send Reset Link
            </button>
        </form>

        <div class="mt-8 border-t border-gray-200 pt-6">
            <p class="text-sm text-center text-gray-600">
                Remember your password?
                <a href="{% url 'login' %}"
                    class="font-bold text-indigo-600 hover:text-indigo-500 hover:underline transition-colors duration-200">Back
                    to Login</a>
            </p>
        </div>
    </div>
</div>

<style>
    .custom-django-form p {
        margin-bottom: 1.25rem;
    }

    .custom-django-form label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151;
        margin-bottom: 0.5rem;
    }

    .custom-django-form input {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        border: 1px solid #D1D5DB;
        background-color: #F9FAFB;
        transition: all 0.2s ease-in-out;
    }

    .custom-django-form input:focus {
        background-color: #ffffff;
        border-color: #4f46e5;
        outline: none;
        box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }
</style>
{% endblock %}
