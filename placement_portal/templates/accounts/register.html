{% extends 'base.html' %}
{% load socialaccount %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-10">
    <div class="max-w-lg w-full bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Create an Account</h2>
            <p class="text-sm text-gray-500 mt-2">Join the placement portal to kickstart your career</p>
        </div>

        <form method="post" action="{% url 'account_signup' %}" class="space-y-5">
            {% csrf_token %}

            <div class="custom-django-form">
                {{ form.as_p }}
            </div>

            <div class="grid grid-cols-1 gap-5 mt-4 pt-4 border-t border-gray-100">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <input type="email" name="email"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 sm:text-sm transition-colors duration-200 ease-in-out bg-gray-50 hover:bg-white"
                            placeholder="you@example.com" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Qualification (e.g., B.Tech CS,
                        MCA)</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 14l9-5-9-5-9 5 9 5z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 14l9-5-9-5-9 5 9 5zm0 0v6"></path>
                            </svg>
                        </div>
                        <input type="text" name="qualification"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 sm:text-sm transition-colors duration-200 ease-in-out bg-gray-50 hover:bg-white"
                            placeholder="Highest Degree" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Phone Number</label>
                    <div class="relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                                </path>
                            </svg>
                        </div>
                        <input type="text" name="phone"
                            class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 sm:text-sm transition-colors duration-200 ease-in-out bg-gray-50 hover:bg-white"
                            placeholder="+1 (555) 000-0000" required>
                    </div>
                </div>
            </div>

            <button type="submit"
                class="w-full flex justify-center mt-8 py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-all duration-300 transform hover:-translate-y-0.5">
                Complete Registration
            </button>
        </form>



        <div class="mt-8 border-t border-gray-200 pt-6">
            <p class="text-sm text-center text-gray-600">
                Already have an account?
                <a href="{% url 'login' %}"
                    class="font-bold text-green-600 hover:text-green-500 hover:underline transition-colors duration-200">Sign
                    in</a>
            </p>
        </div>
    </div>

    <style>
        .custom-django-form p {
            margin-bottom: 1.25rem;
        }

        .custom-django-form label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }

        .custom-django-form input,
        .custom-django-form select {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #D1D5DB;
            background-color: #F9FAFB;
            transition: all 0.2s ease-in-out;
        }

        .custom-django-form input:focus,
        .custom-django-form select:focus {
            background-color: #ffffff;
            border-color: #10B981;
            outline: none;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .custom-django-form span.helptext {
            display: block;
            font-size: 0.75rem;
            color: #6B7280;
            margin-top: 0.25rem;
        }
    </style>
</div>
{% endblock %}
